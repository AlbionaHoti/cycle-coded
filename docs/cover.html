<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>cycle-coded cover</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1280px;
      height: 640px;
      overflow: hidden;
      font-family: Inter, system-ui, sans-serif;
      background: #000;
    }
    .frame {
      position: relative;
      width: 1280px;
      height: 640px;
      overflow: hidden;
    }
    .bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.04);
      filter: saturate(1.05) contrast(1.02);
    }
    .grade {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0.15) 40%, rgba(0,0,0,0.55) 100%),
        rgba(255, 77, 154, 0.12);
      mix-blend-mode: normal;
    }
    .pink {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(255, 77, 154, 0.18), transparent 70%);
      pointer-events: none;
    }
    .content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px;
      z-index: 2;
    }
    .badge {
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: #fff;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 999px;
      padding: 10px 22px;
      margin-bottom: 28px;
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.2);
    }
    h1 {
      font-family: "Instrument Serif", Georgia, serif;
      font-weight: 400;
      font-size: 96px;
      line-height: 1;
      color: #fff;
      text-shadow: 0 8px 40px rgba(0,0,0,0.45);
      margin-bottom: 18px;
    }
    .sub {
      font-family: "Instrument Serif", Georgia, serif;
      font-size: 28px;
      color: rgba(255, 255, 255, 0.92);
      max-width: 820px;
      line-height: 1.25;
      margin-bottom: 16px;
      text-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    .meta {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 0.02em;
      max-width: 720px;
      line-height: 1.45;
    }
    .footer {
      position: absolute;
      bottom: 28px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.45);
      z-index: 2;
    }
  </style>
</head>
<body>
  <div class="frame">
    <img class="bg" src="../web/public/train-window.png" alt="" />
    <div class="grade"></div>
    <div class="pink"></div>
    <div class="content">
      <div class="badge">Your agent finally gets the week you're actually in</div>
      <h1>cycle-coded</h1>
      <p class="sub">PMS wants truth. Luteal wants the cut.<br />Some weeks you run, launch, pitch, sell.</p>
      <p class="meta">Same question. Different day. Different correct answer.<br />Claude · Codex · ChatGPT · Gemini · Grok</p>
    </div>
    <div class="footer">one command install · not medical advice</div>
  </div>
</body>
</html>
